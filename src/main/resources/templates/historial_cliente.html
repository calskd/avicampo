<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Historial de compras - Avicampo</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>
<div class="app">
<aside class="sidebar">
    <div class="logo-box">
        <img class="logo" src="/img/pollo.jpg" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2270%22 font-size=%2270%22>🐔</text></svg>'">
        <div><div class="brand">AVICAMPO</div><div class="tag">Gestión avícola</div></div>
    </div>
    <nav class="nav">
        <a class="" href="/"><i class="fa-solid fa-house"></i> Inicio</a>
        <a class="active" href="/clientes"><i class="fa-solid fa-users"></i> Clientes</a>
        <a class="" href="/compras"><i class="fa-solid fa-box"></i> Compras / Lotes</a>
        <a class="" href="/ventas"><i class="fa-solid fa-cart-shopping"></i> Ventas</a>
        <a class="" href="/alimentacion"><i class="fa-solid fa-bowl-food"></i> Alimentación</a>
        <a class="" href="/vacunacion"><i class="fa-solid fa-syringe"></i> Vacunación</a>
        <a class="" href="/mortalidad"><i class="fa-solid fa-skull-crossbones"></i> Mortalidad</a>
    </nav>
    <div class="summary"><p>Moneda</p><strong>Q GTQ</strong><p>Inventario inicia</p><strong>0</strong></div>
</aside>
<main class="main">
<div class="top">
    <div><h1>Historial de compras</h1><p>Gestiona tu avicampo de forma fácil y eficiente.</p></div>
    <div class="datebox">
        <span><i class="fa-regular fa-calendar"></i> <span id="fechaHoy"></span></span>
        <span><i class="fa-regular fa-clock"></i> <span id="horaHoy"></span></span>
        <div class="admin"><div class="adminicon"><i class="fa-solid fa-user"></i></div><div><b>Admin</b><br><small>Administrador</small></div></div>
    </div>
</div>
<section class="content">

<div class="pagehead"><h2 th:text="'Historial de ' + ${cliente.nombre}">Historial</h2><a class="back" href="/clientes">⬅ Clientes</a></div>
<div class="panel"><p><b>Saldo pendiente:</b> <span th:text="'Q ' + ${#numbers.formatDecimal(cliente.saldoPendiente,1,2)}"></span></p><table class="table"><thead><tr><th>Fecha</th><th>Total</th><th>Tipo pago</th></tr></thead><tbody><tr th:each="v:${ventas}"><td th:text="${#temporals.format(v.fecha,'dd/MM/yyyy HH:mm')}"></td><td th:text="'Q ' + ${#numbers.formatDecimal(v.total,1,2)}"></td><td th:text="${v.tipoPago}"></td></tr></tbody></table></div>

</section>
</main>
</div>
<script>
function actualizarFechaHora() {
    const ahora = new Date();
    document.getElementById('fechaHoy').textContent = ahora.toLocaleDateString('es-GT', {day:'2-digit', month:'long', year:'numeric'});
    document.getElementById('horaHoy').textContent = ahora.toLocaleTimeString('es-GT', {hour:'2-digit', minute:'2-digit'});
}
actualizarFechaHora();
setInterval(actualizarFechaHora, 30000);
</script>
</body>
</html>
